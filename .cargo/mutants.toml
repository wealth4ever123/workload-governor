# cargo-mutants configuration for WorkloadGovernor
# Docs: https://mutants.rs/configuration.html

# Test command: enable testutils feature so Soroban test harness is available
test_tool = "cargo"
additional_cargo_test_args = ["--features", "testutils"]

# Kill any mutant whose test run exceeds 120 s (prevents the 10k-iteration
# prop_global_cap test from stalling the whole run).
timeout = 120

# Only mutate core business logic — skip events, errors boilerplate, and tests
examine_globs = ["src/lib.rs", "src/storage.rs"]

# Skip TTL/instance-bump helpers: they call Soroban host functions that are
# no-ops in the unit-test harness and cannot be observed by tests.
skip_calls = [
    "storage::bump_instance",
    "storage::extend_app_entry_ttl",
    "storage::extend_global_app_count_ttl",
    "storage::extend_instance_ttl",
    "events::*",
]
