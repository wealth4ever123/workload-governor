name: Contract CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  contract-ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust wasm target
        run: rustup target add wasm32v1-none

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build WASM
        run: cargo build --target wasm32v1-none --release

      - name: Run tests
        run: cargo test --features testutils

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Audit dependencies
        run: cargo audit

      - name: Install cargo-mutants
        run: cargo install cargo-mutants --locked

      - name: Mutation testing
        run: |
          cargo mutants --no-shuffle -j 2 --timeout 120 \
            | tee mutants-report.txt || true
          echo "--- Mutation summary ---"
          grep -E "^(Found|ok|MISSED|CAUGHT|TIMEOUT|FAILED)" mutants-report.txt | tail -20 || true

      - name: Upload mutation report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mutants-report
          path: |
            mutants-report.txt
            mutants.out/

      - name: Optimize WASM
        if: github.ref == 'refs/heads/main'
        run: stellar contract optimize --wasm target/wasm32v1-none/release/workload_governor.wasm

      - name: Upload optimized WASM
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: workload_governor.optimized.wasm
          path: target/wasm32v1-none/release/workload_governor.optimized.wasm

  testnet-deploy:
    name: Testnet deploy + smoke test
    needs: contract-ci
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    env:
      NETWORK: testnet
      ADMIN_KEY: ci-admin
    steps:
      - uses: actions/checkout@v4

      - name: Install stellar-cli
        run: cargo install stellar-cli --features opt --locked

      - name: Import CI admin key
        env:
          STELLAR_SECRET: ${{ secrets.CI_ADMIN_SECRET }}
        run: stellar keys add "$ADMIN_KEY" --secret-key "$STELLAR_SECRET"

      - name: Download optimized WASM
        uses: actions/download-artifact@v4
        with:
          name: workload_governor.optimized.wasm
          path: target/wasm32v1-none/release/

      - name: Deploy contract
        id: deploy
        run: |
          CONTRACT_ID=$(stellar contract deploy \
            --wasm target/wasm32v1-none/release/workload_governor.optimized.wasm \
            --network "$NETWORK" \
            --source "$ADMIN_KEY")
          echo "contract_id=$CONTRACT_ID" >> "$GITHUB_OUTPUT"
          echo "### Deployed Contract ID" >> "$GITHUB_STEP_SUMMARY"
          echo "\`$CONTRACT_ID\`" >> "$GITHUB_STEP_SUMMARY"

      - name: Run CI smoke tests
        env:
          CONTRACT_ID: ${{ steps.deploy.outputs.contract_id }}
        run: bash tests/smoke/ci-smoke.sh
