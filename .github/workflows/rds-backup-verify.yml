name: RDS backup verify

on:
  schedule:
    - cron: '0 6 * * 1'  # Every Monday 06:00 UTC
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Verify latest automated backup exists
        env:
          DB_ID: ${{ secrets.RDS_DB_INSTANCE_ID }}
        run: |
          LATEST=$(aws rds describe-db-snapshots \
            --db-instance-identifier "${DB_ID}" \
            --snapshot-type automated \
            --query 'sort_by(DBSnapshots, &SnapshotCreateTime)[-1].{id:DBSnapshotIdentifier,status:Status,time:SnapshotCreateTime}' \
            --output json)
          echo "Latest backup: ${LATEST}"
          STATUS=$(echo "${LATEST}" | jq -r '.status')
          [ "${STATUS}" = "available" ] || { echo "ERROR: backup not available"; exit 1; }
