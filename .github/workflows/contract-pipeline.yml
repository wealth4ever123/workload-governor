name: Contract Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Fuzz job runs nightly at 02:00 UTC
    - cron: '0 2 * * *'

# Cancel in-flight runs for the same branch on new push
concurrency:
  group: contract-pipeline-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  # ── 1. Lint ──────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    if: github.event_name != 'schedule'
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-lint-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-lint-

      - name: fmt check
        run: cargo fmt --all -- --check

      - name: clippy
        run: cargo clippy --features testutils -- -D warnings

  # ── 2. Test + Coverage ───────────────────────────────────────────────────
  test:
    name: Test & Coverage
    runs-on: ubuntu-latest
    if: github.event_name != 'schedule'
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-test-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-test-

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Run tests with coverage
        run: |
          cargo llvm-cov --features testutils \
            --lcov --output-path lcov.info \
            --summary-only 2>&1 | tee coverage-summary.txt

      - name: Post coverage comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const summary = fs.readFileSync('coverage-summary.txt', 'utf8');
            const lines = summary.split('\n').filter(l => l.includes('TOTAL') || l.includes('Lines') || l.includes('Functions'));
            const body = `## 📊 Coverage Report\n\`\`\`\n${lines.join('\n')}\n\`\`\``;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.startsWith('## 📊 Coverage Report'));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Upload lcov to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: lcov.info
          flags: contract
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  # ── 3. Build WASM ────────────────────────────────────────────────────────
  build-wasm:
    name: Build WASM
    runs-on: ubuntu-latest
    if: github.event_name != 'schedule'
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32v1-none

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-wasm-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-wasm-

      - name: Build WASM
        run: cargo build --target wasm32v1-none --release

      - name: Upload unoptimized WASM
        uses: actions/upload-artifact@v4
        with:
          name: workload-governor-wasm-unoptimized
          path: target/wasm32v1-none/release/workload_governor.wasm
          retention-days: 7

  # ── 4. Optimize WASM (main only) ─────────────────────────────────────────
  optimize:
    name: Optimize WASM
    runs-on: ubuntu-latest
    needs: build-wasm
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32v1-none

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-wasm-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-wasm-

      - name: Install Stellar CLI
        run: cargo install --locked stellar-cli --features opt

      - name: Build WASM
        run: cargo build --target wasm32v1-none --release

      - name: Optimize WASM
        run: |
          stellar contract optimize \
            --wasm target/wasm32v1-none/release/workload_governor.wasm \
            --wasm-out target/wasm32v1-none/release/workload_governor.optimized.wasm

      - name: Upload optimized WASM artifact
        uses: actions/upload-artifact@v4
        with:
          name: workload-governor-wasm-optimized
          path: target/wasm32v1-none/release/workload_governor.optimized.wasm
          retention-days: 90

  # ── 5. Fuzz (nightly schedule only) ──────────────────────────────────────
  fuzz:
    name: Fuzz (10 min)
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@nightly

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-fuzz-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-fuzz-

      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz --locked

      - name: Run fuzz targets (10 minutes each)
        run: |
          # List all fuzz targets and run each for 600 seconds
          for target in $(cargo fuzz list 2>/dev/null || echo ""); do
            echo "Fuzzing target: $target"
            cargo fuzz run "$target" -- -max_total_time=600 || true
          done
        continue-on-error: true

      - name: Upload fuzz artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-artifacts
          path: fuzz/artifacts/
          if-no-files-found: ignore
          retention-days: 7
